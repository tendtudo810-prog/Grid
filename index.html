<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Display</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="cabecalho">
        <h2 class="logo">Logo</h2>
        <div class="container-1">
            <h3 class="info">Sobre</h3>
            <h3 class="info">Produtos</h3>
            <h3 class="info">Contato</h3>
        </div>
    </header>

    <div class="container">
        <div class="foto"></div>
        <div class="foto1"></div>
        <div class="foto2"></div>
    </div>

    <div class="textos">
        <p class="not">Notícia 1</p>
        <p class="not1">Notícia 2</p>
        <p class="not2">Notícia 3</p>
    </div>

    <div class="container-2">
        <div class="propaganda">

        </div>
    </div>

    <div class="propa-txt">
        <p>Propaganda</p>
    </div>

    <div class="container-7">
        <div class="containers">
            <div class="container-3">
                <div class="imagens"></div>
                <div class="imagens1"></div>
            </div>

            <div class="container-4">
                <div class="imagens2"></div>
                <div class="imagens3"></div>
            </div>

            <div class="container-5">
                <div class="imagens4"></div>
                <div class="imagens5"></div>
            </div>

            <div class="container-6">
                <p class="text">Produto</p>
                <p class="text1">Produto</p>
                <p class="text2">Produto</p>
                <p class="text3">Produto</p>
                <p class="text4">Produto</p>
                <p class="text5">Produto</p>
            </div>
        </div>

</body>

</html>
